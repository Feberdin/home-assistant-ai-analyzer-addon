# Purpose: Home Assistant app/add-on manifest for the AI Analyzer container.
# Input/Output: Read by the Supervisor to build, configure, and run the add-on.
# Invariants: Keep slug unique, ingress port aligned with the web server, and paths read-only where possible.
# Debugging: If installation or startup fails, validate this file first in Home Assistant and the add-on logs.
name: "Home Assistant AI Analyzer"
version: "0.2.0"
slug: "home_assistant_ai_analyzer"
description: >-
  Analyze Home Assistant configuration, automations, templates, entities,
  and runtime behavior to generate structured findings and improvement ideas.
url: "https://github.com/Feberdin/home-assistant-ai-analyzer-addon"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-outline
panel_title: AI Analyzer
panel_admin: true
homeassistant_api: true
watchdog: "http://[HOST]:[PORT:8099]/api/health"
map:
  - type: homeassistant_config
    read_only: true
options:
  base_config_path: "/homeassistant"
  output_path: "/data/analysis"
  log_level: "info"
  scan_mode: "full"
  lookback_days: 7
  run_on_startup: true
  enable_runtime_analysis: true
  enable_recorder_db: false
  recorder_db_path: "/homeassistant/home-assistant_v2.db"
  enable_ai: false
  llm_base_url: "https://api.openai.com/v1/chat/completions"
  llm_model: "gpt-4.1-mini"
  llm_api_key: ""
  llm_max_findings: 5
  max_history_entities: 20
  exclude_paths:
    - ".storage"
    - "deps"
    - "__pycache__"
schema:
  base_config_path: str
  output_path: str
  log_level: "list(debug|info|warning|error)"
  scan_mode: "list(quick|full|deep)"
  lookback_days: "int(1,30)"
  run_on_startup: bool
  enable_runtime_analysis: bool
  enable_recorder_db: bool
  recorder_db_path: "str?"
  enable_ai: bool
  llm_base_url: "url?"
  llm_model: "str?"
  llm_api_key: "password?"
  llm_max_findings: "int(1,20)"
  max_history_entities: "int(1,100)"
  exclude_paths:
    - str
